# Nylo - Micro-framework for Flutter.
#
# Website: https://nylo.dev
# Official repository: https://github.com/nylo-core/nylo
# Author: Anthony Gordon <https://github.com/agordn52>

name: disaster_app
description: A new Flutter application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  google_fonts: ^8.1.0
  analyzer: ^10.0.1
  intl: ^0.20.2
  nylo_framework: ^7.1.21
  cupertino_icons: ^1.0.9
  font_awesome_flutter: ^11.0.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  image_picker: ^1.2.2
  geolocator: ^14.0.2
  sqflite: ^2.4.2+1
  path: ^1.9.1
  flutter_svg: ^2.3.0
  url_launcher: ^6.3.2
  path_provider: ^2.1.6

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  # The following line 'flutter_lints' activates a set of recommended lints.
#  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

# APP ICON - public/app_icon/icon.png
# Build icons: "dart run flutter_launcher_icons"
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon/logo.png"
  remove_alpha_ios: true

flutter:


  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/app_icon/
    - lang/
    - assets/json/
